<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Learn Form tags key value paired format</h1>
    <form action="get">
        <label for = "name">Name:</label>
        <input placeholder="name" type="text" name="name" id="name" id="name">
        <div></div>
        <label for =gender >Select Gender:</label>
        <input type="radio" name="gender" value="male" id="male">
        <label for ="male" >Male</label>
        <input type="radio" name="gender" value="female" id="female">
        <label for ="female" >Female</label>
        <div></div>
        <label for="sub">Select Subjects</label>
        <br>
        <input type="checkbox" name="sub" value="java" id="java">
        <label for="java" >Java</label>
             <br>
        <input type="checkbox" name="sub" value="c++" id="c++"> 
           <label for="c++" >C++</label>        <br>
        <input type="checkbox" name="sub" value="python" id="python"> 
           <label for="python" >Python</label>     <br>

        <div></div>
        <input type="date">
        <input type="submit" value="submit">   
    </form>
    
</body>
</html>
